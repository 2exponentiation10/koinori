name: Deploy koinori

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, Linux, koinori]
    env:
      DEPLOY_ROOT: /opt/protfolio
      PROJECT_NAME: koinori
      DOCKER_SUDO: "false"
      KOINORI_APP_PORT: ${{ vars.KOINORI_APP_PORT }}
      KOINORI_ADMIN_KEY: ${{ secrets.ADMIN_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify application
        run: npm run verify

      - name: Verify Docker
        run: |
          docker --version
          docker compose version

      - name: Prepare runtime env
        shell: bash
        run: |
          PROJECT_DIR="${DEPLOY_ROOT}/${PROJECT_NAME}"
          mkdir -p "${PROJECT_DIR}" "${PROJECT_DIR}/data"

          APP_PORT="${KOINORI_APP_PORT:-7085}"
          ADMIN_KEY="${KOINORI_ADMIN_KEY:-}"

          if [[ -z "${ADMIN_KEY}" ]]; then
            echo "::error::Missing secret ADMIN_KEY"
            exit 1
          fi

          cat > "${PROJECT_DIR}/.env" <<EOF
          PORT=3000
          HOST_PORT=${APP_PORT}
          ADMIN_KEY=${ADMIN_KEY}
          TRUST_PROXY=1
          COOKIE_SECURE=1
          APP_DATA_DIR=${PROJECT_DIR}/data
          EOF

          echo "Prepared ${PROJECT_DIR}/.env"
          echo "APP_PORT=${APP_PORT}"

      - name: Deploy
        run: bash scripts/deploy_koinori.sh

      - name: Smoke check
        shell: bash
        run: |
          APP_PORT="${KOINORI_APP_PORT:-7085}"
          curl -fsS "http://127.0.0.1:${APP_PORT}/health"
